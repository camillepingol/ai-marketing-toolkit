<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Marketing Toolkit</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: #111827;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }

    h1 {
      text-align: center;
      font-size: 22px;
      margin-bottom: 15px;
    }

    .chatbox {
      height: 400px;
      overflow-y: auto;
      background: #0b1220;
      padding: 10px;
      border-radius: 10px;
      margin-bottom: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      white-space: pre-wrap;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .ai {
      background: #1f2937;
    }

    .input-area {
      display: flex;
      gap: 10px;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }
  </style>
</head>

<body>

<div class="container">
  <h1>🤖 AI Marketing Toolkit</h1>

  <div id="chat" class="chatbox"></div>

  <div class="input-area">
    <input id="input" placeholder="Type your idea..." />
    <button onclick="send()">Send</button>
  </div>
</div>

<script src="script.js"></script>

</body>
</html>

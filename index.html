<!DOCTYPE html>
<html>
<head>
  <title>AI Marketing Toolkit</title>
</head>
<body>

<h1>🤖 AI Marketing Toolkit</h1>

<input id="input" placeholder="Type here..." />
<button onclick="send()">Send</button>

<pre id="out"></pre>

<script>
async function send() {
  const input = document.getElementById("input").value;
  const out = document.getElementById("out");

  if (!input) {
    out.innerText = "Please type something...";
    return;
  }

  out.innerText = "Thinking...";

  try {
    const res = await fetch("/api/generate", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ input })
    });

    console.log("STATUS:", res.status);

    const text = await res.text();
    console.log("RAW:", text);

    let data;
    try {
      data = JSON.parse(text);
    } catch (e) {
      data = { error: text };
    }

    out.innerText = data.output || data.error || "No response from API";

  } catch (err) {
    console.log(err);
    out.innerText = "Error connecting to API";
  }
}
</script>

</body>
</html>

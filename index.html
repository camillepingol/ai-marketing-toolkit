<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Marketing Toolkit Pro</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #0b1220;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .app {
      width: 100%;
      max-width: 850px;
      background: #111827;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 14px;
      text-align: center;
      font-weight: bold;
      background: #1f2937;
    }

    .tools {
      display: flex;
      gap: 8px;
      padding: 10px;
      flex-wrap: wrap;
      background: #0f172a;
    }

    .tools button {
      padding: 6px 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #2563eb;
      color: white;
      font-size: 12px;
    }

    #chat {
      height: 420px;
      overflow-y: auto;
      padding: 10px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      white-space: pre-wrap;
      position: relative;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .ai {
      background: #374151;
    }

    .copy {
      position: absolute;
      top: 5px;
      right: 8px;
      font-size: 10px;
      cursor: pointer;
      background: #111827;
      padding: 3px 6px;
      border-radius: 6px;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 10px;
      background: #0f172a;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button.send {
      padding: 12px 16px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
    }

    .typing {
      opacity: 0.7;
      font-style: italic;
    }
  </style>
</head>

<body>

<div class="app">

  <div class="header">🤖 AI Marketing Toolkit Pro</div>

  <div class="tools">
    <button onclick="quick('SEO Title')">SEO</button>
    <button onclick="quick('Facebook Ad Caption')">Facebook</button>
    <button onclick="quick('Product Description')">Product</button>
    <button onclick="quick('Hashtags')">Hashtags</button>
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Type your idea..." />
    <button class="send" onclick="send()">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>

<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Marketing Toolkit</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #0f172a, #111827);
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 100%;
      max-width: 800px;
      background: rgba(17, 24, 39, 0.95);
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 10px 40px rgba(0,0,0,0.6);
      display: flex;
      flex-direction: column;
    }

    .header {
      padding: 16px;
      text-align: center;
      font-size: 20px;
      font-weight: bold;
      background: #1f2937;
    }

    #chat {
      height: 450px;
      overflow-y: auto;
      padding: 12px;
    }

    .msg {
      padding: 10px;
      margin: 8px 0;
      border-radius: 10px;
      white-space: pre-wrap;
      line-height: 1.4;
    }

    .user {
      background: #2563eb;
      text-align: right;
    }

    .ai {
      background: #374151;
    }

    .input-area {
      display: flex;
      gap: 10px;
      padding: 12px;
      background: #0f172a;
    }

    input {
      flex: 1;
      padding: 12px;
      border-radius: 10px;
      border: none;
      outline: none;
    }

    button {
      padding: 12px 18px;
      border: none;
      border-radius: 10px;
      background: #22c55e;
      color: white;
      cursor: pointer;
      font-weight: bold;
    }

    button:hover {
      background: #16a34a;
    }

    .loading {
      opacity: 0.6;
      font-style: italic;
    }
  </style>
</head>

<body>

<div class="container">

  <div class="header">
    🤖 AI Marketing Toolkit
  </div>

  <div id="chat"></div>

  <div class="input-area">
    <input id="input" placeholder="Type your idea..." />
    <button onclick="send()">Send</button>
  </div>

</div>

<script src="script.js"></script>

</body>
</html>
